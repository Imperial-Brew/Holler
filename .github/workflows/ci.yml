name: CI

# Runs on every pull request, and on pushes to master after merge.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest  # Docker is preinstalled, so testcontainers works
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # matches the production image
      - name: Install dependencies (app + test)
        run: pip install -r requirements-dev.txt
      - name: Run backend tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"  # matches the production image
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
